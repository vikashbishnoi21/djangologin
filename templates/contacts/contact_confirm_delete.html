{% extends 'base.html' %}

{% block title %}Confirm Delete{% endblock %}

{% block content %}
<h3>Delete {{ contact.name }}?</h3>
<form method="post">
  {% csrf_token %}
  <button class="btn btn-danger" type="submit">Yes, delete</button>
  <a class="btn btn-secondary" href="{% url 'contact_list' %}">Cancel</a>
</form>

{% endblock %}

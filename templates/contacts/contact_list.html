{% extends 'base.html' %}

{% block title %}Contact List{% endblock %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-3">
  <h2>Contacts</h2>
  <a class="btn btn-success" href="{% url 'create_contact' %}">Add Contact</a>
</div>

<table class="table table-striped">
  <thead>
    <tr>
      <th>#</th>
      <th>Name</th>
      <th>Mobile</th>
      <th>Address</th>
      <th></th>
    </tr>
  </thead>
  <tbody>
    {% for c in contacts %}
    <tr>
      <td>{{ forloop.counter }}</td>
      <td>{{ c.name }}</td>
      <td>{{ c.mob }}</td>
      <td>{{ c.address }}</td>
      <td>
        <form method="post" action="{% url 'delete_contact' c.pk %}" style="display:inline">
          {% csrf_token %}
          <button class="btn btn-sm btn-danger" type="submit">Delete</button>
        </form>
      </td>
    </tr>
    {% empty %}
    <tr><td colspan="5">No contacts yet.</td></tr>
    {% endfor %}
  </tbody>
</table>

{% endblock %}

{% extends 'base.html' %}

{% block title %}Add Contact{% endblock %}

{% block content %}
<h2>Add Contact</h2>
<form method="post">
  {% csrf_token %}
  {{ form.as_p }}
  <button class="btn btn-primary" type="submit">Save</button>
  <a class="btn btn-secondary" href="{% url 'contact_list' %}">Back</a>
</form>

{% endblock %}
